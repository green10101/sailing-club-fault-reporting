version: '3.8'

services:
  web:
    image: php:8.0-apache
    container_name: sailing_club_web
    volumes:
      - ./public:/var/www/html
      - ./src:/var/www/html/src
      - ./sql:/var/www/html/sql
      - ./migrations:/var/www/html/migrations
      - ./resources:/var/www/html/resources
      - ./composer.json:/var/www/html/composer.json
      - ./phpunit.xml:/var/www/html/phpunit.xml
      - ./.env.example:/var/www/html/.env
    ports:
      - "8080:80"
    depends_on:
      - db

  db:
    image: mysql:5.7
    container_name: sailing_club_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sailing_club
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: